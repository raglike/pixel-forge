<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge - 像素动画工具</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #1f4068;
      --bg-card-hover: #264573;
      --accent: #00d9ff;
      --accent-glow: rgba(0, 217, 255, 0.4);
      --accent-secondary: #e94560;
      --accent-secondary-glow: rgba(233, 69, 96, 0.4);
      --text-primary: #eaeaea;
      --text-secondary: #a0aec0;
      --text-muted: #6b7280;
      --border: #2a2a4a;
      --border-light: #3d3d6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg-dark); 
      color: var(--text-primary); 
      font-family: 'SF Mono', 'Fira Code', 'Consolas', system-ui, sans-serif;
      min-height: 100vh;
    }
    input[type="range"] { 
      -webkit-appearance: none; 
      background: var(--border); 
      border-radius: 4px; 
      height: 6px; 
      cursor: pointer; 
    }
    input[type="range"]::-webkit-slider-thumb { 
      -webkit-appearance: none; 
      width: 16px; 
      height: 16px; 
      border-radius: 4px; 
      background: var(--accent); 
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .drop-zone { 
      border: 2px dashed var(--border-light);
      transition: all 0.3s ease;
    }
    .drop-zone.drag-over { 
      border-color: var(--accent) !important; 
      background: rgba(0, 217, 255, 0.08);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--border-light); }
      50% { border-color: var(--accent); }
    }
    .drop-zone-idle {
      animation: pulse-border 3s ease-in-out infinite;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    
    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-dark);
    }
    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .btn-danger {
      background: var(--accent-secondary);
      color: white;
    }
    .btn-danger:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-secondary-glow);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    
    .frame-item { transition: all 0.2s ease; }
    .frame-item.selected { 
      box-shadow: 0 0 0 3px var(--accent), 0 0 15px var(--accent-glow);
    }
    .frame-item:hover { transform: scale(1.08); }
    
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s ease;
    }
    .card:hover {
      border-color: var(--border-light);
    }
    
    .title-text {
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }
    
    .section-title {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    
    .canvas-container {
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      overflow: hidden;
    }
    
    .progress-bar {
      background: var(--border);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      height: 100%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    
    input[type="text"],
    input[type="number"],
    select {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    
    .badge {
      background: var(--accent);
      color: var(--bg-dark);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .badge-pro {
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
      color: white;
    }
    .badge-enterprise {
      background: linear-gradient(135deg, #f39c12, #e74c3c);
      color: white;
    }
    
    .toolbar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    
    .frame-list { 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap; 
    }

    /* Color picker styles */
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s ease;
    }
    .color-swatch:hover {
      transform: scale(1.15);
      border-color: white;
    }
    .color-swatch.selected {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* Tab styles */
    .tab-btn {
      padding: 8px 16px;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      border: none;
      background: var(--bg-dark);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--bg-card);
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-primary);
    }

    /* Palette item */
    .palette-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .palette-item:hover {
      background: var(--bg-card-hover);
    }
    .palette-item.active {
      border-color: var(--accent);
      background: rgba(0,217,255,0.1);
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 24px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      width: 90%;
    }

    /* GIF drop zone */
    .gif-drop-zone {
      border: 2px dashed var(--border-light);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
    }
    .gif-drop-zone:hover, .gif-drop-zone.drag-over {
      border-color: var(--accent-secondary);
      background: rgba(233,69,96,0.1);
    }

    /* Preset card */
    .preset-card {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .preset-card:hover {
      border-color: var(--accent);
      background: rgba(0,217,255,0.05);
    }
    .preset-card.active {
      border-color: var(--accent);
      background: rgba(0,217,255,0.1);
      box-shadow: 0 0 12px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ========== VERSION CONFIG ==========
    const VERSION_CONFIG = {
      free: {
        maxResolution: 64,
        maxFrames: 8,
        customPalette: false,
        onionSkin: false,
        animationPresets: false,
        asepriteExport: false,
        gifImport: false,
        threePreview: false,
        aiFeatures: false,
      },
      pro: {
        maxResolution: 256,
        maxFrames: 32,
        customPalette: true,
        onionSkin: true,
        animationPresets: true,
        asepriteExport: true,
        gifImport: true,
        threePreview: true,
        aiFeatures: true,
      },
      enterprise: {
        maxResolution: Infinity,
        maxFrames: Infinity,
        customPalette: true,
        onionSkin: true,
        animationPresets: true,
        asepriteExport: true,
        gifImport: true,
        threePreview: true,
        aiFeatures: true,
      }
    };

    const DEFAULT_VERSION = 'pro';

    function medianCut(imgData, maxColors) {
      if (!imgData || !imgData.data || imgData.data.length === 0) return [];
      const pixels = [];
      for (let i = 0; i < imgData.data.length; i += 4) {
        pixels.push([imgData.data[i], imgData.data[i+1], imgData.data[i+2]]);
      }
      function getColorRange(pixels) {
        let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
        for (const p of pixels) {
          minR=Math.min(minR,p[0]); maxR=Math.max(maxR,p[0]);
          minG=Math.min(minG,p[1]); maxG=Math.max(maxG,p[1]);
          minB=Math.min(minB,p[2]); maxB=Math.max(maxB,p[2]);
        }
        const r=maxR-minR, g=maxG-minG, b=maxB-minB;
        if (r>=g && r>=b) return 0;
        if (g>=r && g>=b) return 1;
        return 2;
      }
      function split(pixels) {
        const channel = getColorRange(pixels);
        pixels.sort((a,b) => a[channel]-b[channel]);
        const mid = Math.floor(pixels.length/2);
        return [pixels.slice(0,mid), pixels.slice(mid)];
      }
      function avgColor(pixels) {
        if (pixels.length===0) return [0,0,0];
        const s=pixels.reduce((a,p)=>[a[0]+p[0],a[1]+p[1],a[2]+p[2]],[0,0,0]);
        return [Math.round(s[0]/pixels.length),Math.round(s[1]/pixels.length),Math.round(s[2]/pixels.length)];
      }
      let buckets = [pixels];
      while (buckets.length < maxColors) {
        buckets.sort((a,b)=>b.length-a.length);
        const b = buckets.shift();
        if (b.length < 2) { buckets.push(b); break; }
        const [a1,a2] = split(b);
        buckets.push(a1,a2);
      }
      return buckets.map(avgColor);
    }

    const PALETTES = {
      "PICO-8": ["#000000","#1D2B53","#7E2553","#008751","#AB5236","#5F574F","#C2C3C7","#FFF1E8","#FF004D","#FFA300","#FFEC27","#00E436","#29ADFF","#83769C","#FF77A8","#FFCCAA"],
      "NES": ["#000000","#fcfcfc","#f8f8f8","#bcbcbc","#7c7c7c","#a4e4fc","#3cbcfc","#0078f8","#0000fc","#b8b8f8","#6888fc","#0058f8","#0000bc","#d8b8f8","#9878f8","#6844fc","#4428bc","#f8b8f8","#f878f8","#d800cc","#940084","#f8a4c0","#f85898","#e40058","#a80020","#f0d0b0","#f87858","#f83800","#a81000","#fce0a8","#fca044","#e45c10","#881400","#f8d878","#f8b800","#ac7c00","#503000","#d8f878","#b8f818","#00b800","#007800","#b8f8b8","#58d854","#00a800","#006800","#b8f8d8","#58f898","#00a844","#005800","#00fcfc","#00e8d8","#008888","#004058","#f8d8f8","#787878"],
      "GameBoy": ["#0f380f","#306230","#8bac0f","#9bbc0f"],
      "灰度": Array.from({length:16},(_,i)=>{const v=Math.round(i*17);return"#"+v.toString(16).padStart(2,"0").repeat(3);})
    };

    // ========== ANIMATION PRESETS ==========
    const BUILTIN_PRESETS = {
      walk4: { name: '走路循环(4帧)', frames: 4, loop: true, description: '经典4帧走路循环' },
      walk6: { name: '走路循环(6帧)', frames: 6, loop: true, description: '流畅6帧走路' },
      walk8: { name: '走路循环(8帧)', frames: 8, loop: true, description: '精细8帧走路' },
      idle2: { name: '待机(2帧)', frames: 2, loop: true, description: '简单待机动画' },
      idle4: { name: '待机(4帧)', frames: 4, loop: true, description: '细腻待机' },
      attack3: { name: '攻击(3帧)', frames: 3, loop: false, description: '快速三连击' },
      attack5: { name: '攻击(5帧)', frames: 5, loop: false, description: '完整攻击动作' },
      attack6: { name: '攻击(6帧)', frames: 6, loop: false, description: '精细攻击' },
      jump4: { name: '跳跃(4帧)', frames: 4, loop: false, description: '标准跳跃' },
      death4: { name: '死亡(4帧)', frames: 4, loop: false, description: '经典死亡' },
      death6: { name: '死亡(6帧)', frames: 6, loop: false, description: '完整死亡动画' },
    };

    function App() {
      // Version
      const [version, setVersion] = useState(() => localStorage.getItem('pixelforge_version') || DEFAULT_VERSION);
      const versionConf = VERSION_CONFIG[version] || VERSION_CONFIG.pro;

      // 3D Preview state
      const [threeInitialized, setThreeInitialized] = useState(false);
      const threeRefs = useRef({ scene: null, camera: null, renderer: null, sprite: null, controls: null, animationId: null });
      const threeCanvasRef = useRef(null);
      const [threeView, setThreeView] = useState('front');
      const [threeBgColor, setThreeBgColor] = useState('#1a1a2e');
      const [threeAmbient, setThreeAmbient] = useState(0.5);
      const [threeDirectional, setThreeDirectional] = useState(1.0);
      const [threeScale, setThreeScale] = useState(1.0);

      // Core state
      const [frames, setFrames] = useState([]);
      const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
      const [res, setRes] = useState(64);
      const [colors, setColors] = useState(16);
      const [paletteMode, setPaletteMode] = useState("auto");
      const [palette, setPalette] = useState([]);
      const [paletteColors, setPaletteColors] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [fps, setFps] = useState(12);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [exportProgress, setExportProgress] = useState(0);
      const [frameNaming, setFrameNaming] = useState("frame_{n}");
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [spriteCols, setSpriteCols] = useState(4);

      // F10: Onion Skin
      const [onionSkin, setOnionSkin] = useState(false);
      const [onionOpacity, setOnionOpacity] = useState(30);
      const [onionPrev, setOnionPrev] = useState(true);
      const [onionNext, setOnionNext] = useState(true);
      const [onionPrevFrames, setOnionPrevFrames] = useState(1);
      const [onionNextFrames, setOnionNextFrames] = useState(1);

      // F13: Custom Palette Editor
      const [customPalettes, setCustomPalettes] = useState(() => {
        const saved = localStorage.getItem('pixelforge_custom_palettes');
        return saved ? JSON.parse(saved) : {};
      });
      const [activePalette, setActivePalette] = useState(null);
      const [paletteTab, setPaletteTab] = useState('builtin');
      const [editingPaletteName, setEditingPaletteName] = useState('');
      const [showPaletteEditor, setShowPaletteEditor] = useState(false);
      const [eyedropperActive, setEyedropperActive] = useState(false);

      // F12: Animation Presets
      const [customPresets, setCustomPresets] = useState(() => {
        const saved = localStorage.getItem('pixelforge_custom_presets');
        return saved ? JSON.parse(saved) : [];
      });
      const [selectedPreset, setSelectedPreset] = useState(null);
      const [showPresetPanel, setShowPresetPanel] = useState(false);
      const [showSavePresetModal, setShowSavePresetModal] = useState(false);
      const [newPresetName, setNewPresetName] = useState('');
      const [presetPreviewPlaying, setPresetPreviewPlaying] = useState(false);

      // F11: GIF Smart Decomposition
      const [gifDropZone, setGifDropZone] = useState(false);
      const [gifFrames, setGifFrames] = useState([]);
      const [gifDuplicateDetect, setGifDuplicateDetect] = useState(true);
      const [showGifPanel, setShowGifPanel] = useState(false);
      const [gifProcessing, setGifProcessing] = useState(false);
      const [gifOriginalCount, setGifOriginalCount] = useState(0);
      const [gifProcessedCount, setGifProcessedCount] = useState(0);

      // F14: Aseprite Export
      const [asepriteLayerName, setAsepriteLayerName] = useState('Layer 1');
      const [asepriteFrameTags, setAsepriteFrameTags] = useState('');
      const [showAsepriteModal, setShowAsepriteModal] = useState(false);

      // F33: AI Smart Palette Recommendation
      const [showAiPaletteModal, setShowAiPaletteModal] = useState(false);
      const [aiPaletteResult, setAiPaletteResult] = useState(null);
      const [aiPaletteLoading, setAiPaletteLoading] = useState(false);

      // F34: Sketch to Pixel Art
      const [showSketchModal, setShowSketchModal] = useState(false);
      const [sketchPreview, setSketchPreview] = useState(null);
      const [sketchSettings, setSketchSettings] = useState({
        pixelSize: 4,
        lineThickness: 2,
        smoothing: 50,
        lineColor: '#000000',
        bgColor: '#ffffff'
      });

      // F30: AI Edge-Preserving Pixelation
      const [edgeStrength, setEdgeStrength] = useState(50);

      // F31: AI Tweening (Smart Frame Interpolation)
      const [aiTweenTargetFrames, setAiTweenTargetFrames] = useState(8);
      const [aiTweenStrength, setAiTweenStrength] = useState(50);
      const [aiTweenLoading, setAiTweenLoading] = useState(false);

      // F32: AI Style Transfer
      const [showStyleTransferModal, setShowStyleTransferModal] = useState(false);
      const [selectedStyle, setSelectedStyle] = useState(null);
      const [stylePreviewCanvas, setStylePreviewCanvas] = useState(null);
      const [styleTransferLoading, setStyleTransferLoading] = useState(false);

      // F35: Image Split / Grid Cut
      const [showSplitImageModal, setShowSplitImageModal] = useState(false);
      const [splitCols, setSplitCols] = useState(2);
      const [splitRows, setSplitRows] = useState(2);
      const [splitUniform, setSplitUniform] = useState(true);
      const splitPreviewRef = useRef(null);

      // UI State
      const [activeTab, setActiveTab] = useState('main');
      const [showVersionModal, setShowVersionModal] = useState(false);

      const origCanvasRef = useRef(null);
      const pixelCanvasRef = useRef(null);
      const playTimeoutRef = useRef(null);
      const fileInputRef = useRef(null);
      const gifInputRef = useRef(null);
      const previewCanvasRef = useRef(null);

      const currentFrame = frames[currentFrameIndex];

      // Save custom palettes to localStorage
      useEffect(() => {
        localStorage.setItem('pixelforge_custom_palettes', JSON.stringify(customPalettes));
      }, [customPalettes]);

      // Save custom presets to localStorage
      useEffect(() => {
        localStorage.setItem('pixelforge_custom_presets', JSON.stringify(customPresets));
      }, [customPresets]);

      // Save version preference
      useEffect(() => {
        localStorage.setItem('pixelforge_version', version);
      }, [version]);

      // Keyboard shortcuts
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          
          if (e.key === 'o' || e.key === 'O') {
            if (versionConf.onionSkin) setOnionSkin(prev => !prev);
          } else if (e.key === '[') {
            if (versionConf.onionSkin) setOnionPrev(prev => !prev);
          } else if (e.key === ']') {
            if (versionConf.onionSkin) setOnionNext(prev => !prev);
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [versionConf.onionSkin]);

      useEffect(() => {
        processImage();
      }, [currentFrame, res, colors, palette, paletteMode]);

      // F35: Draw split preview with grid overlay
      useEffect(() => {
        if (!showSplitImageModal || !currentFrame?.imgEl) return;
        const canvas = splitPreviewRef.current;
        if (!canvas) return;

        const imgEl = currentFrame.imgEl;
        // Scale to fit preview area
        const maxW = 400, maxH = 150;
        let w = imgEl.width, h = imgEl.height;
        const scale = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * scale);
        h = Math.round(h * scale);

        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

          const scaledCtx = scaledCanvas.getContext('2d');

          tempCanvas.width = scaledCanvas.width;
          tempCanvas.height = scaledCanvas.height;

        const buffer = await file.arrayBuffer();
        const gifData = new Uint8Array(buffer);
        
        // Simple GIF parser
        const frames_data = [];
        let pos = 0;
        let width = 0, height = 0;
        let globalColorTable = [];
        let delay = 100;
        
        // Read header
        const header = String.fromCharCode.apply(null, gifData.slice(0, 6));

          return;

        // Read logical screen descriptor
        width = gifData[6] + (gifData[7] << 8);
        height = gifData[8] + (gifData[9] << 8);
        const flags = gifData[10];
        const gctSize = 2 << (flags & 0x07);
        
        if (flags & 0x80) {

            globalColorTable.push([gifData[13 + i], gifData[14 + i], gifData[15 + i]]);
          }
        }
        
        pos = 13 + (flags & 0x80 ? gctSize * 3 : 0);
        
        // Find frames
        while (pos < gifData.length) {
          const blockType = gifData[pos];
          
          if (blockType === 0x21) { // Extension
            const extType = gifData[pos + 1];
            if (extType === 0xF9) { // Graphics Control Extension
              const blockSize = gifData[pos + 2];
              const delayData = gifData[pos + 4] + (gifData[pos + 5] << 8);
              delay = delayData * 10 || 100;
              pos += 2 + blockSize + 1;
            } else {
              pos += 2;
              while (gifData[pos] !== 0) pos += gifData[pos] + 1;
              pos++;
            }
          } else if (blockType === 0x2C) { // Image Descriptor
            const imgLeft = gifData[pos + 1] + (gifData[pos + 2] << 8);
            const imgTop = gifData[pos + 3] + (gifData[pos + 4] << 8);
            const imgWidth = gifData[pos + 5] + (gifData[pos + 6] << 8);
            const imgHeight = gifData[pos + 7] + (gifData[pos + 8] << 8);
            const imgFlags = gifData[pos + 9];
            const localCT = imgFlags & 0x80;
            const lctSize = localCT ? (2 << (imgFlags & 0x07)) : 0;
            
            pos += 10;
            if (localCT) {
              const localColors = [];
              for (let i = 0; i < lctSize * 3; i += 3) {
                localColors.push([gifData[pos + i], gifData[pos + i + 1], gifData[pos + i + 2]]);
              }
              pos += lctSize * 3;
            }
            
            // Skip LZW min code size
            pos++;
            
            // Read image data sub-blocks
            const imageData = [];
            let subBlockSize = gifData[pos];
            while (subBlockSize !== 0) {
              for (let i = 1; i <= subBlockSize; i++) {
                imageData.push(gifData[pos + i]);
              }
              pos += subBlockSize + 1;
              subBlockSize = gifData[pos];
            }
            pos++;
            
            // Create canvas for this frame
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            // Fill with transparency
            ctx.clearRect(0, 0, width, height);
            
            // Use color table
            const colorTable = localCT ? localColors.map(c => `rgb(${c[0]},${c[1]},${c[2]})`) : globalColorTable.map(c => `rgb(${c[0]},${c[1]},${c[2]})`);
            
            // Simple rendering (just draw rectangles per pixel - simplified)
            // For proper GIF decoding we'd need LZW decompression
            // For now, create a placeholder

            ctx.fillRect(0, 0, width, height);
            
            // Create img element

            frames_data.push({

              imgEl: img,
              name: `frame_${frames_data.length}`,
              duration: delay,
              canvas: canvas
            });
            
          } else if (blockType === 0x3B) { // Trailer
            break;
          } else {
            pos++;
          }
        }
        
        setGifOriginalCount(frames_data.length);
        
        // Detect duplicates if enabled

      const exportAsepriteAse = async () => {
        if (frames.length === 0) return;
        setIsExporting(true);
        setExportProgress(0);

        // Aseprite .ase file format
        // Simplified binary format
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res;
        tempCanvas.height = res;
        const ctx = tempCanvas.getContext('2d');

        // Calculate total file size (rough estimate)
        // For each frame: header + chunk header + image data
        const frames_data = [];

        for (let i = 0; i < frames.length; i++) {
          processFrameToCanvas(frames[i], tempCanvas);
          const imageData = ctx.getImageData(0, 0, res, res);
          
          // Convert to RGBA bytes
          const rgba = new Uint8Array(res * res * 4);
          for (let j = 0; j < imageData.data.length; j++) {
            rgba[j] = imageData.data[j];
          }
          
          frames_data.push({
            duration: frames[i].duration,
            rgba
          });
          
          setExportProgress(Math.round((i + 1) / frames.length * 80));
        }

        // Build ASE file
        const headerSize = 4 + 2 + 2 + 4 + 4 + 2 + 2; // signature + version + frames + width + height + depth + flags
        let fileSize = headerSize;
        
        for (const frame of frames_data) {
          // Frame header: word(chunks) + dword(duration)
          // Each frame has 2 chunks: CEL + PALETTE
          fileSize += 6 + 4 + (res * res * 4) + 6 + 4; // rough estimate
        }

        const buffer = new ArrayBuffer(fileSize);
        const view = new DataView(buffer);
        let offset = 0;

        // Signature: "ASES"
        view.setUint8(offset++, 0x41);
        view.setUint8(offset++, 0x53);
        view.setUint8(offset++, 0x45);
        view.setUint8(offset++, 0x53);

        // Version: 1
        view.setUint16(offset, 1); offset += 2;

        // Number of frames
        view.setUint32(offset, frames.length); offset += 4;

        // Width
        view.setUint32(offset, res); offset += 4;

        // Height
        view.setUint32(offset, res); offset += 4;

        // Color depth (32-bit RGBA)
        view.setUint16(offset, 32); offset += 2;

        // Flags
        view.setUint16(offset, 0); offset += 2;

        // Write each frame
        for (let i = 0; i < frames_data.length; i++) {
          const frame = frames_data[i];
          
          // Frame header
          view.setUint16(offset, 1); offset += 2; // 1 chunk for now
          view.setUint32(offset, frame.duration); offset += 4;
          
          // CEL chunk (type 0x2004)
          const celChunkSize = 4 + 2 + 2 + 2 + 2 + 4 + 4 + 1 + (res * res * 4);
          view.setUint32(offset, 0x2004); offset += 4;
          view.setUint32(offset, celChunkSize); offset += 4;
          view.setUint16(offset, 0); offset += 2; // layer index
          view.setUint16(offset, i); offset += 2; // frame number
          view.setUint16(offset, 0); offset += 2; // x
          view.setUint16(offset, 0); offset += 2; // y
          view.setUint16(offset, res); offset += 2; // width
          view.setUint16(offset, res); offset += 2; // height
          view.setUint32(offset, 0); offset += 4; // opacity (unused in RGBA)
          view.setUint8(offset, 2); offset += 1; // cel type (raw)
          
          // Image data
          for (let j = 0; j < frame.rgba.length; j++) {
            view.setUint8(offset++, frame.rgba[j]);
          }
          
          setExportProgress(80 + Math.round((i + 1) / frames.length * 20));

        saveAs(blob, 'spritesheet.ase');

                React.createElement("div", { className: "card mb-4", style: { background: 'var(--bg-dark)' } },
                  React.createElement("p", { className: "text-sm mb-2", style: { color: 'var(--text-secondary)' } }, "📊 图片分析结果"),
                  React.createElement("p", { className: "text-xs", style: { color: 'var(--text-muted)' } }, aiPaletteResult.analysis)
                ),
                React.createElement("p", { className: "section-title mb-3" }, "推荐调色板"),
                React.createElement("div", { className: "space-y-3" },
                  aiPaletteResult.recommendations.slice(0, 4).map((rec, idx) =>
                    React.createElement("div", { key: rec.palette, className: "preset-card" + (idx === 0 ? ' active' : '') },
                      React.createElement("div", { className: "flex items-center justify-between mb-2" },
                        React.createElement("div", { className: "flex items-center gap-2" },
                          React.createElement("span", { className: "font-bold" }, idx === 0 ? "🏆 " : idx + 1 + ". "),
                          React.createElement("span", null, rec.palette),
                          idx === 0 && React.createElement("span", { className: "badge" }, "最佳")
                        ),
                        React.createElement("span", { className: "text-xs", style: { color: 'var(--accent)' } },
                          Math.round(rec.score * 100) + "% 匹配"
                        )
                      ),
                      React.createElement("p", { className: "text-xs mb-2", style: { color: 'var(--text-muted)' } }, rec.reason),
                      React.createElement("div", { className: "flex gap-1 flex-wrap" },
                        rec.colors.slice(0, 8).map((c, i) =>
                          React.createElement("div", { key: i, className: "w-5 h-5 rounded-sm", style: { background: c, border: '1px solid var(--border)' } })
                        ),
                        rec.colors.length > 8 && React.createElement("span", { className: "text-xs", style: { color: 'var(--text-muted)' } }, "...")
                      ),
                      idx === 0 && React.createElement("button", {
                        onClick: () => applyAiRecommendation(rec.palette),
                        className: "btn btn-primary w-full mt-3 justify-center text-sm"
                      }, "✓ 应用此调色板")
                    )
                  )
                )
              ),
              !aiPaletteLoading && aiPaletteResult && !aiPaletteResult.success && React.createElement("div", { className: "text-center py-8" },
                React.createElement("div", { className: "text-4xl mb-3" }, "❌"),
                React.createElement("p", { style: { color: 'var(--text-secondary)' } }, aiPaletteResult.message || "分析失败")
              ),
              React.createElement("button", {
                onClick: () => setShowAiPaletteModal(false),
                className: "btn btn-secondary w-full justify-center mt-4"
              }, "关闭")
            )
          ),

          // F32: AI Style Transfer Modal
          showStyleTransferModal && React.createElement("div", { className: "modal-overlay", onClick: () => { setShowStyleTransferModal(false); } },
            React.createElement("div", { className: "modal-content", style: { maxWidth: '700px' }, onClick: e => e.stopPropagation() },
              React.createElement("h3", { className: "text-xl font-bold mb-4", style: { color: 'var(--accent)' } }, "🎨 AI风格迁移"),
              React.createElement("p", { className: "text-sm mb-4", style: { color: 'var(--text-secondary)' } }, "选择一种风格，预览效果后决定是否应用"),

              // Style options
              React.createElement("div", { className: "grid grid-cols-2 gap-3 mb-4" },
                React.createElement("div", {
                  key: 'retro',
                  className: "preset-card cursor-pointer",
                  style: selectedStyle === 'retro' ? { borderColor: 'var(--accent)', background: 'rgba(0,217,255,0.1)' } : {},
                  onClick: () => {
                    setSelectedStyle('retro');
                    setStyleTransferLoading(true);
                    setTimeout(() => {
                      const canvas = applyStyleTransferToCanvas(origCanvasRef.current, 'retro');
                      setStylePreviewCanvas(canvas);
                      setStyleTransferLoading(false);
                    }, 50);
                  }
                },
                  React.createElement("div", { className: "text-lg mb-1" }, "👾 Retro 8-bit"),
                  React.createElement("div", { className: "text-xs", style: { color: 'var(--text-muted)' } }, "NES经典调色板 + 抖动"),
                  React.createElement("div", { className: "flex gap-1 mt-2" },
                    ['#0f380f','#306230','#8bac0f','#9bbc0f'].map((c, i) =>
                      React.createElement("div", { key: i, className: "w-4 h-4 rounded-sm", style: { background: c } })
                    )
                  )
                ),
                React.createElement("div", {
                  key: 'cyberpunk',
                  className: "preset-card cursor-pointer",
                  style: selectedStyle === 'cyberpunk' ? { borderColor: 'var(--accent)', background: 'rgba(0,217,255,0.1)' } : {},
                  onClick: () => {
                    setSelectedStyle('cyberpunk');
                    setStyleTransferLoading(true);
                    setTimeout(() => {
                      const canvas = applyStyleTransferToCanvas(origCanvasRef.current, 'cyberpunk');
                      setStylePreviewCanvas(canvas);
                      setStyleTransferLoading(false);
                    }, 50);
                  }
                },
                  React.createElement("div", { className: "text-lg mb-1" }, "🌃 Cyberpunk"),
                  React.createElement("div", { className: "text-xs", style: { color: 'var(--text-muted)' } }, "霓虹配色 + 边缘光晕"),
                  React.createElement("div", { className: "flex gap-1 mt-2" },
                    ['#00ffff','#ff00ff','#ffff00','#ff0080'].map((c, i) =>
                      React.createElement("div", { key: i, className: "w-4 h-4 rounded-sm", style: { background: c } })
                    )
                  )
                ),
                React.createElement("div", {
                  key: 'cartoon',
                  className: "preset-card cursor-pointer",
                  style: selectedStyle === 'cartoon' ? { borderColor: 'var(--accent)', background: 'rgba(0,217,255,0.1)' } : {},
                  onClick: () => {
                    setSelectedStyle('cartoon');
                    setStyleTransferLoading(true);
                    setTimeout(() => {
                      const canvas = applyStyleTransferToCanvas(origCanvasRef.current, 'cartoon');
                      setStylePreviewCanvas(canvas);
                      setStyleTransferLoading(false);
                    }, 50);
                  }
                },
                  React.createElement("div", { className: "text-lg mb-1" }, "🎨 Cartoon"),
                  React.createElement("div", { className: "text-xs", style: { color: 'var(--text-muted)' } }, "卡通描边 + 扁平色块"),
                  React.createElement("div", { className: "flex gap-1 mt-2" },
                    ['#ff6b6b','#feca57','#48dbfb','#1dd1a1'].map((c, i) =>
                      React.createElement("div", { key: i, className: "w-4 h-4 rounded-sm", style: { background: c } })
                    )
                  )
                ),
                React.createElement("div", {
                  key: 'pixelArt',
                  className: "preset-card cursor-pointer",
                  style: selectedStyle === 'pixelArt' ? { borderColor: 'var(--accent)', background: 'rgba(0,217,255,0.1)' } : {},
                  onClick: () => {
                    setSelectedStyle('pixelArt');
                    setStyleTransferLoading(true);
                    setTimeout(() => {
                      const canvas = applyStyleTransferToCanvas(origCanvasRef.current, 'pixelArt');
                      setStylePreviewCanvas(canvas);
                      setStyleTransferLoading(false);
                    }, 50);
                  }
                },
                  React.createElement("div", { className: "text-lg mb-1" }, "📷 Pixel Art"),
                  React.createElement("div", { className: "text-xs", style: { color: 'var(--text-muted)' } }, "PICO-8调色板 + 扩散抖动"),
                  React.createElement("div", { className: "flex gap-1 mt-2" },
                    ['#1D2B53','#7E2553','#008751','#FF004D'].map((c, i) =>
                      React.createElement("div", { key: i, className: "w-4 h-4 rounded-sm", style: { background: c } })
                    )
                  )
                )
              ),

              // Preview area
              React.createElement("div", { className: "mb-4" },
                React.createElement("label", { className: "text-sm mb-2 block", style: { color: 'var(--text-secondary)' } }, "效果预览"),
                React.createElement("div", { className: "canvas-container", style: { minHeight: '150px', background: '#0d0d1a' } },
                  !selectedStyle && React.createElement("div", { className: "text-center", style: { color: 'var(--text-muted)' } },
                    React.createElement("div", { className: "text-3xl mb-2" }, "👆"),
                    React.createElement("div", null, "请选择上方风格")
                  ),
                  selectedStyle && styleTransferLoading && React.createElement("div", { className: "text-center", style: { color: 'var(--text-muted)' } },
                    React.createElement("div", { className: "text-2xl animate-pulse" }, "✨"),
                    React.createElement("div", null, "正在生成预览...")
                  ),
                  selectedStyle && !styleTransferLoading && stylePreviewCanvas && React.createElement("canvas", {
                    ref: el => { if (el && stylePreviewCanvas) { const ctx = el.getContext('2d'); el.width = stylePreviewCanvas.width; el.height = stylePreviewCanvas.height; ctx.drawImage(stylePreviewCanvas, 0, 0); } },
                    style: { maxWidth: '100%', maxHeight: '200px', imageRendering: 'pixelated' }
                  })
              ),

              // Action buttons
              React.createElement("div", { className: "flex gap-3" },
                React.createElement("button", {
                  onClick: () => {
                    if (!selectedStyle || !stylePreviewCanvas) return;
                    setStyleTransferLoading(true);

                    // Apply style to current frame
                    const newImgEl = new Image();
                    newImgEl.onload = () => {
                      setFrames(prev => {
                        const updated = [...prev];
                        updated[currentFrameIndex] = {
                          ...updated[currentFrameIndex],
                          imgEl: newImgEl,
                          name: (updated[currentFrameIndex].name || 'frame') + ' (风格化)'
                        };
                        return updated;
                      });
                      setStyleTransferLoading(false);
                      setShowStyleTransferModal(false);
                    };
                    newImgEl.src = stylePreviewCanvas.toDataURL();
                  },
                  disabled: !selectedStyle || !stylePreviewCanvas || styleTransferLoading,
                  className: "btn btn-primary flex-1 justify-center"
                }, "✓ 应用风格"),
                React.createElement("button", {
                  onClick: () => setShowStyleTransferModal(false),
                  className: "btn btn-secondary flex-1 justify-center"
                }, "取消")
              )
            )
          ),

          // F35: Image Split / Grid Cut Modal
          showSplitImageModal && React.createElement("div", { className: "modal-overlay", onClick: () => { setShowSplitImageModal(false); } },
            React.createElement("div", { className: "modal-content", style: { maxWidth: '600px' }, onClick: e => e.stopPropagation() },
              React.createElement("h3", { className: "text-xl font-bold mb-4", style: { color: 'var(--accent)' } }, "🪓 图片拆分"),
              React.createElement("p", { className: "text-sm mb-4", style: { color: 'var(--text-secondary)' } }, "将大图按网格拆分为多个帧，适合 spritesheet 拆分"),

              // Current frame preview
              React.createElement("div", { className: "mb-4" },
                React.createElement("label", { className: "text-sm mb-2 block", style: { color: 'var(--text-secondary)' } }, "当前帧预览"),
                React.createElement("div", {
                  className: "canvas-container",
                  style: { minHeight: '120px', background: '#0d0d1a', position: 'relative' }
                },
                  currentFrame?.imgEl && React.createElement("canvas", {
                    ref: splitPreviewRef,
                    style: { maxWidth: '100%', maxHeight: '150px', imageRendering: 'pixelated' }
                  })
                )
              ),

              // Grid settings
              React.createElement("div", { className: "mb-4" },
                React.createElement("div", { className: "flex items-center gap-2 mb-2" },
                  React.createElement("input", {
                    type: "checkbox",
                    id: "splitUniform",
                    checked: splitUniform,
                    onChange: e => {
                      setSplitUniform(e.target.checked);
                      if (e.target.checked) setSplitRows(splitCols);
                    }
                  }),
                  React.createElement("label", { htmlFor: "splitUniform", style: { color: 'var(--text-secondary)' } }, "均匀分割（行列数相同）")
                ),
                React.createElement("div", { className: "grid grid-cols-2 gap-4" },
                  React.createElement("div", null,
                    React.createElement("label", { className: "text-sm mb-1 block", style: { color: 'var(--text-secondary)' } }, "列数"),
                    React.createElement("input", {
                      type: "number",
                      min: 1,
                      max: 16,
                      value: splitCols,
                      onChange: e => {
                        const val = Math.max(1, Math.min(16, Number(e.target.value)));
                        setSplitCols(val);
                        if (splitUniform) setSplitRows(val);
                      },
                      className: "w-full"
                    })
                  ),
                  React.createElement("div", null,
                    React.createElement("label", { className: "text-sm mb-1 block", style: { color: 'var(--text-secondary)' } }, "行数"),
                    React.createElement("input", {
                      type: "number",
                      min: 1,
                      max: 16,
                      value: splitRows,
                      onChange: e => {
                        const val = Math.max(1, Math.min(16, Number(e.target.value)));
                        setSplitRows(val);
                        if (splitUniform) setSplitCols(val);
                      },
                      disabled: splitUniform,
                      className: "w-full"
                    })
                  )
                )
              ),

              // Grid preview overlay info
              React.createElement("div", { className: "mb-4 text-sm", style: { color: 'var(--text-muted)' } },
                `拆分结果: ${splitCols * splitRows} 帧 (${splitCols}×${splitRows})`
              ),

              // Action buttons
              React.createElement("div", { className: "flex gap-3" },
                React.createElement("button", {
                  onClick: async () => {
                    if (!currentFrame?.imgEl) return;

                    const imgEl = currentFrame.imgEl;
                    const splitResults = window.splitImageGrid(imgEl, splitCols, splitRows);

                    if (splitResults.length === 0) {
                      alert('拆分失败，请确保图片已加载');
                      return;
                    }

                    const newFrames = await window.splitResultsToFrames(splitResults, currentFrame.name || 'frame', currentFrame.duration || 100);

                    // Check frame limit
                    if (newFrames.length > versionConf.maxFrames) {
                      alert(`拆分后有${newFrames.length}帧，超出${versionConf.maxFrames}帧限制`);
                      return;
                    }

                    // Replace all frames with the split frames
                    setFrames(newFrames);
                    setCurrentFrameIndex(0);
                    setShowSplitImageModal(false);
                  },
                  disabled: !currentFrame?.imgEl,
                  className: "btn btn-primary flex-1 justify-center",
                  style: { background: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)' }
                }, "🪓 拆分"),
                React.createElement("button", {
                  onClick: () => setShowSplitImageModal(false),
                  className: "btn btn-secondary flex-1 justify-center"
                }, "关闭")
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
