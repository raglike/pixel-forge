<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge - 像素动画工具</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #1f4068;
      --bg-card-hover: #264573;
      --accent: #00d9ff;
      --accent-glow: rgba(0, 217, 255, 0.4);
      --accent-secondary: #e94560;
      --accent-secondary-glow: rgba(233, 69, 96, 0.4);
      --text-primary: #eaeaea;
      --text-secondary: #a0aec0;
      --text-muted: #6b7280;
      --border: #2a2a4a;
      --border-light: #3d3d6b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: var(--bg-dark); 
      color: var(--text-primary); 
      font-family: 'SF Mono', 'Fira Code', 'Consolas', system-ui, sans-serif;
      min-height: 100vh;
    }
    input[type="range"] { 
      -webkit-appearance: none; 
      background: var(--border); 
      border-radius: 4px; 
      height: 6px; 
      cursor: pointer; 
    }
    input[type="range"]::-webkit-slider-thumb { 
      -webkit-appearance: none; 
      width: 16px; 
      height: 16px; 
      border-radius: 4px; 
      background: var(--accent); 
      cursor: pointer;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .drop-zone { 
      border: 2px dashed var(--border-light);
      transition: all 0.3s ease;
    }
    .drop-zone.drag-over { 
      border-color: var(--accent) !important; 
      background: rgba(0, 217, 255, 0.08);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--border-light); }
      50% { border-color: var(--accent); }
    }
    .drop-zone-idle {
      animation: pulse-border 3s ease-in-out infinite;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    
    /* Button styles */
    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: var(--accent);
      color: var(--bg-dark);
    }
    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .btn-danger {
      background: var(--accent-secondary);
      color: white;
    }
    .btn-danger:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--accent-secondary-glow);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }
    
    /* Frame item */
    .frame-item { transition: all 0.2s ease; }
    .frame-item.selected { 
      box-shadow: 0 0 0 3px var(--accent), 0 0 15px var(--accent-glow);
    }
    .frame-item:hover { transform: scale(1.08); }
    
    /* Card styles */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s ease;
    }
    .card:hover {
      border-color: var(--border-light);
    }
    
    /* Title font */
    .title-text {
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }
    
    /* Section headers */
    .section-title {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    
    /* Preview canvas container */
    .canvas-container {
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      overflow: hidden;
    }
    
    /* Progress bar */
    .progress-bar {
      background: var(--border);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      height: 100%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--accent-glow);
    }
    
    /* Input styles */
    input[type="text"],
    input[type="number"],
    select {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    
    /* Tooltip badge */
    .badge {
      background: var(--accent);
      color: var(--bg-dark);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    /* Grid layout */
    .toolbar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    
    /* Frame list */
    .frame-list { 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap; 
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    function medianCut(imgData, maxColors) {
      const pixels = [];
      for (let i = 0; i < imgData.data.length; i += 4) {
        pixels.push([imgData.data[i], imgData.data[i+1], imgData.data[i+2]]);
      }
      function getColorRange(pixels) {
        let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
        for (const p of pixels) {
          minR=Math.min(minR,p[0]); maxR=Math.max(maxR,p[0]);
          minG=Math.min(minG,p[1]); maxG=Math.max(maxG,p[1]);
          minB=Math.min(minB,p[2]); maxB=Math.max(maxB,p[2]);
        }
        const r=maxR-minR, g=maxG-minG, b=maxB-minB;
        if (r>=g && r>=b) return 0;
        if (g>=r && g>=b) return 1;
        return 2;
      }
      function split(pixels) {
        const channel = getColorRange(pixels);
        pixels.sort((a,b) => a[channel]-b[channel]);
        const mid = Math.floor(pixels.length/2);
        return [pixels.slice(0,mid), pixels.slice(mid)];
      }
      function avgColor(pixels) {
        if (pixels.length===0) return [0,0,0];
        const s=pixels.reduce((a,p)=>[a[0]+p[0],a[1]+p[1],a[2]+p[2]],[0,0,0]);
        return [Math.round(s[0]/pixels.length),Math.round(s[1]/pixels.length),Math.round(s[2]/pixels.length)];
      }
      let buckets = [pixels];
      while (buckets.length < maxColors) {
        buckets.sort((a,b)=>b.length-a.length);
        const b = buckets.shift();
        if (b.length < 2) { buckets.push(b); break; }
        const [a1,a2] = split(b);
        buckets.push(a1,a2);
      }
      return buckets.map(avgColor);
    }

    const PALETTES = {
      "PICO-8": ["#000000","#1D2B53","#7E2553","#008751","#AB5236","#5F574F","#C2C3C7","#FFF1E8","#FF004D","#FFA300","#FFEC27","#00E436","#29ADFF","#83769C","#FF77A8","#FFCCAA"],
      "NES": ["#000000","#fcfcfc","#f8f8f8","#bcbcbc","#7c7c7c","#a4e4fc","#3cbcfc","#0078f8","#0000fc","#b8b8f8","#6888fc","#0058f8","#0000bc","#d8b8f8","#9878f8","#6844fc","#4428bc","#f8b8f8","#f878f8","#d800cc","#940084","#f8a4c0","#f85898","#e40058","#a80020","#f0d0b0","#f87858","#f83800","#a81000","#fce0a8","#fca044","#e45c10","#881400","#f8d878","#f8b800","#ac7c00","#503000","#d8f878","#b8f818","#00b800","#007800","#b8f8b8","#58d854","#00a800","#006800","#b8f8d8","#58f898","#00a844","#005800","#00fcfc","#00e8d8","#008888","#004058","#f8d8f8","#787878"],
      "GameBoy": ["#0f380f","#306230","#8bac0f","#9bbc0f"],
      "灰度": Array.from({length:16},(_,i)=>{const v=Math.round(i*17);return"#"+v.toString(16).padStart(2,"0").repeat(3);})
    };

    function App() {
      const [frames, setFrames] = useState([]);
      const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
      const [res, setRes] = useState(64);
      const [colors, setColors] = useState(16);
      const [paletteMode, setPaletteMode] = useState("auto");
      const [palette, setPalette] = useState([]);
      const [paletteColors, setPaletteColors] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [fps, setFps] = useState(12);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [exportProgress, setExportProgress] = useState(0);
      const [frameNaming, setFrameNaming] = useState("frame_{n}");
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [spriteCols, setSpriteCols] = useState(4);
      const origCanvasRef = useRef(null);
      const pixelCanvasRef = useRef(null);
      const playTimeoutRef = useRef(null);
      const fileInputRef = useRef(null);

      const currentFrame = frames[currentFrameIndex];

      useEffect(() => {
        processImage();
      }, [currentFrame, res, colors, palette, paletteMode]);

      useEffect(() => {
        return () => {
          if (playTimeoutRef.current) clearTimeout(playTimeoutRef.current);
        };
      }, []);

      const processImage = useCallback(() => {
        if (!currentFrame) return;
        const imgEl = currentFrame.imgEl;
        const oc = origCanvasRef.current;
        const pc = pixelCanvasRef.current;
        if (!oc || !pc) return;

        const maxW = 512, maxH = 512;
        let w = imgEl.width, h = imgEl.height;
        const scale = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*scale); h = Math.round(h*scale);

        oc.width = w; oc.height = h;
        const octx = oc.getContext("2d");
        octx.drawImage(imgEl, 0, 0, w, h);

        const sampleData = octx.getImageData(0, 0, w, h);
        const autoPalette = medianCut(sampleData.data, colors);
        const currentPalette = paletteMode === "auto" ? autoPalette : palette;
        setPaletteColors(currentPalette);

        const pw = res, ph = res;
        pc.width = pw; pc.height = ph;
        const pctx = pc.getContext("2d");
        pctx.imageSmoothingEnabled = false;
        pctx.drawImage(oc, 0, 0, pw, ph);

        const pixelData = pctx.getImageData(0, 0, pw, ph);
        const data = pixelData.data;
        for (let i = 0; i < data.length; i += 4) {
          const [r,g,b] = [data[i],data[i+1],data[i+2]];
          let best = currentPalette[0]||[0,0,0], bestDist = Infinity;
          for (const c of currentPalette) {
            const d = (r-c[0])**2+(g-c[1])**2+(b-c[2])**2;
            if (d < bestDist) { bestDist=d; best=c; }
          }
          data[i]=best[0]; data[i+1]=best[1]; data[i+2]=best[2];
        }
        pctx.putImageData(pixelData, 0, 0);
      }, [currentFrame, res, colors, palette, paletteMode]);

      const processFrameToCanvas = (frame, canvas) => {
        const imgEl = frame.imgEl;
        const maxW = 512, maxH = 512;
        let w = imgEl.width, h = imgEl.height;
        const scale = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*scale); h = Math.round(h*scale);

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(imgEl, 0, 0, w, h);

        const sampleData = tempCtx.getImageData(0, 0, w, h);
        const autoPalette = medianCut(sampleData.data, colors);
        const currentPalette = paletteMode === "auto" ? autoPalette : palette;

        const pw = res, ph = res;
        canvas.width = pw;
        canvas.height = ph;
        const pctx = canvas.getContext('2d');
        pctx.imageSmoothingEnabled = false;
        pctx.drawImage(tempCanvas, 0, 0, pw, ph);

        const pixelData = pctx.getImageData(0, 0, pw, ph);
        const data = pixelData.data;
        for (let i = 0; i < data.length; i += 4) {
          const [r,g,b] = [data[i],data[i+1],data[i+2]];
          let best = currentPalette[0]||[0,0,0], bestDist = Infinity;
          for (const c of currentPalette) {
            const d = (r-c[0])**2+(g-c[1])**2+(b-c[2])**2;
            if (d < bestDist) { bestDist=d; best=c; }
          }
          data[i]=best[0]; data[i+1]=best[1]; data[i+2]=best[2];
        }
        pctx.putImageData(pixelData, 0, 0);
      };

      const handleFile = (file) => {
        if (!file) return;
        const url = URL.createObjectURL(file);
        const imgEl = new Image();
        imgEl.onload = () => {
          const newFrame = {
            id: Date.now(),
            imgEl: imgEl,
            name: file.name,
            duration: Math.round(1000 / fps)
          };
          setFrames(prev => [...prev, newFrame]);
        };
        imgEl.src = url;
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        const file = e.dataTransfer.files[0];
        if (file && /\.(png|jpe?g|webp|gif)$/i.test(file.name)) handleFile(file);
      };

      const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const handleDragLeave = () => setIsDragging(false);
      const handleInputChange = (e) => handleFile(e.target.files[0]);

      const handleFileInputClick = () => {
        fileInputRef.current?.click();
      };

      const addFrameFromImage = () => {
        fileInputRef.current?.click();
      };

      const deleteFrame = (index) => {
        if (frames.length <= 1) return;
        const newFrames = frames.filter((_, i) => i !== index);
        setFrames(newFrames);
        if (currentFrameIndex >= newFrames.length) {
          setCurrentFrameIndex(newFrames.length - 1);
        }
      };

      const updateFrameDuration = (index, duration) => {
        const newFrames = [...frames];
        newFrames[index] = { ...newFrames[index], duration };
        setFrames(newFrames);
      };

      const handleDragStart = (e, index) => {
        setDraggedIndex(index);
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleFrameDragOver = (e, index) => {
        e.preventDefault();
        if (draggedIndex === null || draggedIndex === index) return;
        
        const newFrames = [...frames];
        const draggedFrame = newFrames[draggedIndex];
        newFrames.splice(draggedIndex, 1);
        newFrames.splice(index, 0, draggedFrame);
        setFrames(newFrames);
        setDraggedIndex(index);
        setCurrentFrameIndex(index);
      };

      const handleDragEnd = () => {
        setDraggedIndex(null);
      };

      const playAnimation = useCallback(() => {
        if (frames.length < 2) return;
        setIsPlaying(true);
        let frameIdx = 0;
        
        const playFrame = () => {
          const pc = pixelCanvasRef.current;
          if (!pc || !frames[frameIdx]) return;
          
          processFrameToCanvas(frames[frameIdx], pc);
          
          const delay = frames[frameIdx]?.duration || Math.round(1000 / fps);
          playTimeoutRef.current = setTimeout(playFrame, delay);
          frameIdx = (frameIdx + 1) % frames.length;
        };
        
        playFrame();
      }, [frames, fps, colors, paletteMode, palette, res]);

      const stopAnimation = useCallback(() => {
        if (playTimeoutRef.current) {
          clearTimeout(playTimeoutRef.current);
          playTimeoutRef.current = null;
        }
        setIsPlaying(false);
        processImage();
      }, [processImage]);

      const togglePlay = () => {
        if (isPlaying) {
          stopAnimation();
        } else {
          playAnimation();
        }
      };

      const exportGif = () => {
        if (frames.length === 0) return;
        setIsExporting(true);
        setExportProgress(0);

        const gif = new GIF({
          workers: 2,
          quality: 10,
          width: res,
          height: res,
          workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
        });

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res;
        tempCanvas.height = res;
        const tempCtx = tempCanvas.getContext('2d');

        frames.forEach((frame, index) => {
          processFrameToCanvas(frame, tempCanvas);
          gif.addFrame(tempCtx, { copy: true, delay: frame.duration });
          setExportProgress(Math.round((index + 1) / frames.length * 50));
        });

        gif.on('progress', (p) => {
          setExportProgress(50 + Math.round(p * 50));
        });

        gif.on('finished', (blob) => {
          saveAs(blob, 'animation.gif');
          setIsExporting(false);
          setExportProgress(0);
        });

        gif.render();
      };

      const exportPngSequence = async () => {
        if (frames.length === 0) return;
        setIsExporting(true);
        setExportProgress(0);

        const zip = new JSZip();
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res;
        tempCanvas.height = res;

        for (let i = 0; i < frames.length; i++) {
          processFrameToCanvas(frames[i], tempCanvas);
          
          const dataUrl = tempCanvas.toDataURL('image/png');
          const base64 = dataUrl.split(',')[1];
          
          let filename = frameNaming
            .replace('{n}', String(i + 1).padStart(3, '0'))
            .replace('{name}', frames[i].name.replace(/\.[^.]+$/, ''));
          if (!filename.endsWith('.png')) filename += '.png';
          
          zip.file(filename, base64, { base64: true });
          setExportProgress(Math.round((i + 1) / frames.length * 90));
        }

        const content = await zip.generateAsync({ type: 'blob' });
        saveAs(content, 'frames.zip');
        setIsExporting(false);
        setExportProgress(0);
      };

      // Day 3: Sprite Sheet Export
      const exportSpriteSheet = async () => {
        if (frames.length === 0) return;
        setIsExporting(true);
        setExportProgress(0);

        const cols = Math.min(spriteCols, frames.length);
        const rows = Math.ceil(frames.length / cols);
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res * cols;
        tempCanvas.height = res * rows;
        const tempCtx = tempCanvas.getContext('2d');

        for (let i = 0; i < frames.length; i++) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const frameCanvas = document.createElement('canvas');
          frameCanvas.width = res;
          frameCanvas.height = res;
          processFrameToCanvas(frames[i], frameCanvas);
          tempCtx.imageSmoothingEnabled = false;
          tempCtx.drawImage(frameCanvas, col * res, row * res);
          setExportProgress(Math.round((i + 1) / frames.length * 80));
        }

        const dataUrl = tempCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'spritesheet.png';
        link.href = dataUrl;
        link.click();

        setExportProgress(100);
        setTimeout(() => {
          setIsExporting(false);
          setExportProgress(0);
        }, 500);
      };

      // Day 3: JSON Metadata Export
      const exportJson = () => {
        if (frames.length === 0) return;
        setIsExporting(true);
        setExportProgress(0);

        const cols = Math.min(spriteCols, frames.length);
        const rows = Math.ceil(frames.length / cols);

        const framesData = frames.map((frame, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          return {
            index: i,
            filename: frame.name,
            duration: frame.duration,
            frame: {
              x: col * res,
              y: row * res,
              w: res,
              h: res
            }
          };
        });

        const jsonData = {
          name: "PixelForge Export",
          version: "1.0",
          frameCount: frames.length,
          frameSize: { w: res, h: res },
          spriteSize: { w: res * cols, h: res * rows },
          columns: cols,
          rows: rows,
          frames: framesData
        };

        const blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
        saveAs(blob, 'spritesheet.json');
        
        setExportProgress(100);
        setTimeout(() => {
          setIsExporting(false);
          setExportProgress(0);
        }, 500);
      };

      // Combined Sprite Sheet + JSON export
      const exportSpriteSheetWithJson = async () => {
        if (frames.length === 0) return;
        setIsExporting(true);
        setExportProgress(0);

        const cols = Math.min(spriteCols, frames.length);
        const rows = Math.ceil(frames.length / cols);

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res * cols;
        tempCanvas.height = res * rows;
        const tempCtx = tempCanvas.getContext('2d');

        const framesData = [];

        for (let i = 0; i < frames.length; i++) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          
          const frameCanvas = document.createElement('canvas');
          frameCanvas.width = res;
          frameCanvas.height = res;
          processFrameToCanvas(frames[i], frameCanvas);
          tempCtx.imageSmoothingEnabled = false;
          tempCtx.drawImage(frameCanvas, col * res, row * res);

          framesData.push({
            index: i,
            filename: frames[i].name,
            duration: frames[i].duration,
            frame: {
              x: col * res,
              y: row * res,
              w: res,
              h: res
            }
          });

          setExportProgress(Math.round((i + 1) / frames.length * 70));
        }

        // Export PNG
        const dataUrl = tempCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'spritesheet.png';
        link.href = dataUrl;
        link.click();

        setExportProgress(85);

        // Export JSON
        const jsonData = {
          name: "PixelForge Export",
          version: "1.0",
          frameCount: frames.length,
          frameSize: { w: res, h: res },
          spriteSize: { w: res * cols, h: res * rows },
          columns: cols,
          rows: rows,
          frames: framesData
        };

        const jsonBlob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
        saveAs(jsonBlob, 'spritesheet.json');

        setExportProgress(100);
        setTimeout(() => {
          setIsExporting(false);
          setExportProgress(0);
        }, 500);
      };

      const getFrameThumbnail = (frame) => {
        const canvas = document.createElement('canvas');
        canvas.width = 48;
        canvas.height = 48;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        
        if (frame.imgEl) {
          const scale = Math.min(48 / frame.imgEl.width, 48 / frame.imgEl.height);
          const w = frame.imgEl.width * scale;
          const h = frame.imgEl.height * scale;
          ctx.drawImage(frame.imgEl, (48 - w) / 2, (48 - h) / 2, w, h);
        }
        return canvas.toDataURL();
      };

      return React.createElement("div", { className: "min-h-screen p-4 md:p-6" },
        React.createElement("div", { className: "max-w-7xl mx-auto" },
          // Header
          React.createElement("div", { className: "text-center mb-6" },
            React.createElement("h1", { className: "title-text text-3xl font-bold mb-2" }, 
              React.createElement("span", { style: { color: 'var(--accent)' } }, "PIXEL"),
              React.createElement("span", { style: { color: 'var(--accent-secondary)' } }, "FORGE")
            ),
            React.createElement("p", { className: "text-sm", style: { color: 'var(--text-muted)' } }, "像素动画工具 · Day 1-3 完整版")
          ),
          
          // Toolbar
          React.createElement("div", { className: "card mb-4" },
            React.createElement("div", { className: "toolbar-grid" },
              React.createElement("button", {
                onClick: addFrameFromImage,
                className: "btn btn-primary"
              }, "+ 添加帧"),
              React.createElement("button", {
                onClick: togglePlay,
                disabled: frames.length < 2,
                className: "btn btn-secondary"
              }, isPlaying ? "⏸ 暂停" : "▶ 播放"),
              React.createElement("div", { className: "flex items-center gap-2" },
                React.createElement("span", { className: "text-sm", style: { color: 'var(--text-secondary)' } }, "FPS"),
                React.createElement("input", {
                  type: "number",
                  min: 1,
                  max: 60,
                  value: fps,
                  onChange: e => setFps(Number(e.target.value)),
                  className: "w-16 text-center"
                })
              ),
              React.createElement("button", {
                onClick: exportGif,
                disabled: frames.length < 2 || isExporting,
                className: "btn btn-secondary"
              }, "🎬 GIF"),
              React.createElement("button", {
                onClick: exportPngSequence,
                disabled: frames.length < 1 || isExporting,
                className: "btn btn-secondary"
              }, "📦 PNG序列"),
              React.createElement("div", { className: "flex items-center gap-2" },
                React.createElement("span", { className: "text-sm", style: { color: 'var(--text-secondary)' } }, "列"),
                React.createElement("input", {
                  type: "number",
                  min: 1,
                  max: frames.length || 10,
                  value: spriteCols,
                  onChange: e => setSpriteCols(Number(e.target.value)),
                  className: "w-16 text-center"
                })
              ),
              React.createElement("button", {
                onClick: exportSpriteSheet,
                disabled: frames.length < 1 || isExporting,
                className: "btn btn-primary"
              }, "🖼 雪碧图"),
              React.createElement("button", {
                onClick: exportJson,
                disabled: frames.length < 1 || isExporting,
                className: "btn btn-secondary"
              }, "📋 JSON"),
              React.createElement("button", {
                onClick: exportSpriteSheetWithJson,
                disabled: frames.length < 1 || isExporting,
                className: "btn btn-secondary"
              }, "📦 全部导出")
            ),
            isExporting && React.createElement("div", { className: "mt-4" },
              React.createElement("div", { className: "progress-bar" },
                React.createElement("div", {
                  className: "progress-fill",
                  style: { width: exportProgress + '%' }
                })
              ),
              React.createElement("p", { className: "text-xs text-center mt-2", style: { color: 'var(--text-muted)' } }, exportProgress + '%')
            )
          ),

          // Frame List
          React.createElement("div", { className: "card mb-4" },
            React.createElement("p", { className: "section-title" }, "帧列表"),
            React.createElement("div", { className: "frame-list min-h-20 p-3 rounded-lg", style: { background: 'var(--bg-dark)' } },
              frames.length === 0 && React.createElement("p", { className: "text-sm w-full text-center py-6", style: { color: 'var(--text-muted)' } }, "暂无帧，请点击「添加帧」开始"),
              frames.map((frame, index) => 
                React.createElement("div", {
                  key: frame.id,
                  draggable: true,
                  onDragStart: e => handleDragStart(e, index),
                  onDragOver: e => handleFrameDragOver(e, index),
                  onDragEnd: handleDragEnd,
                  onClick: () => { stopAnimation(); setCurrentFrameIndex(index); },
                  className: `frame-item relative cursor-pointer rounded-lg overflow-hidden border-2 ${currentFrameIndex === index ? 'selected' : 'border-transparent'}`,
                  style: { width: 72, height: 72 }
                },
                  React.createElement("img", {
                    src: getFrameThumbnail(frame),
                    className: "w-full h-full object-cover",
                    style: { imageRendering: 'pixelated' }
                  }),
                  React.createElement("div", {
                    className: "absolute bottom-0 left-0 right-0 text-center py-0.5 text-xs font-bold",
                    style                  : 'rgba(0,0,0,0.7)', backgroundColor: 'rgba(0,0,0,0.7)' }
                  }, index + 1),
                  React.createElement("button", {
                    onClick: e => { e.stopPropagation(); deleteFrame(index); },
                    className: "absolute top-0.5 right-0.5 w-5 h-5 rounded-full text-xs flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity",
                    style: { background: 'var(--accent-secondary)', fontSize: 14, lineHeight: 1 }
                  }, "×")
                )
              )
            )
          ),

          // Main Content - 3 Column Layout
          React.createElement("div", { className: "grid grid-cols-1 lg:grid-cols-3 gap-6" },
            // Left Column - Upload & Palette
            React.createElement("div", { className: "space-y-4" },
              // Drop Zone
              React.createElement("div", {
                className: "drop-zone border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all " + (isDragging ? "drag-over" : "drop-zone-idle"),
                onDrop: handleDrop, onDragOver: handleDragOver, onDragLeave: handleDragLeave,
                onClick: handleFileInputClick
              },
                React.createElement("input", { ref: fileInputRef, id: "fileInput", type: "file", accept: ".png,.jpg,.jpeg,.webp,.gif", className: "hidden", onChange: handleInputChange }),
                React.createElement("div", { style: { color: 'var(--accent)' }, className: "text-4xl mb-3" }, "📤"),
                React.createElement("p", { style: { color: 'var(--text-secondary)' } }, "拖拽图片到此处"),
                React.createElement("p", { className: "text-xs mt-2", style: { color: 'var(--text-muted)' } }, "支持 PNG / JPG / WebP / GIF")
              ),

              // Palette Settings
              frames.length > 0 && currentFrame && React.createElement("div", { className: "card" },
                React.createElement("p", { className: "section-title" }, "调色板"),
                React.createElement("div", { className: "flex gap-1 flex-wrap mb-3" },
                  paletteColors.map((c,i) => React.createElement("div", { key: i, className: "w-6 h-6 rounded-sm", style: {background:"rgb("+c[0]+","+c[1]+","+c[2]+")", border: '1px solid var(--border)'} }))
                ),
                React.createElement("select", { className: "w-full mb-3", value: paletteMode, onChange: e=>setPaletteMode(e.target.value) },
                  React.createElement("option", { value: "auto" }, "🎨 自动提取"),
                  Object.keys(PALETTES).map(k=>React.createElement("option", { key: k, value: k }, k))
                ),
                paletteMode !== "auto" && React.createElement("div", { className: "flex gap-1 flex-wrap mb-3" },
                  PALETTES[paletteMode].map((c,i)=>React.createElement("div", { key: i, className: "w-6 h-6 rounded-sm cursor-pointer hover:scale-110 transition-transform", style: {background:c, border: '1px solid var(--border)'} }))
                ),
                React.createElement("div", { className: "mb-3" },
                  <label className="text-sm mb-1 block" style={{color: 'var(--text-secondary)'}}>帧时长 (ms)</label>
                  ,
                  React.createElement("input", {
                    type: "number",
                    min: 50,
                    max: 5000,
                    step: 50,
                    value: currentFrame?.duration || 100,
                    onChange: e => updateFrameDuration(currentFrameIndex, Number(e.target.value)),
                    className: "w-full"
                  })
                ),
                React.createElement("div", null,
                  React.createElement("label", { className: "text-sm mb-1 block", style: { color: 'var(--text-secondary)' } }, "帧命名规则"),
                  React.createElement("input", {
                    type: "text",
                    value: frameNaming,
                    onChange: e => setFrameNaming(e.target.value),
                    placeholder: "frame_{n}",
                    className: "w-full"
                  }),
                  React.createElement("p", { className: "text-xs mt-1", style: { color: 'var(--text-muted)' } }, "可用: {n}=序号, {name}=原文件名")
                )
              )
            ),

            // Middle Column - Preview
            React.createElement("div", { className: "space-y-4" },
              React.createElement("div", { className: "grid grid-cols-2 gap-4" },
                React.createElement("div", { className: "card" },
                  React.createElement("p", { className: "text-xs font-bold mb-2", style: { color: 'var(--text-muted)' } }, "原图"),
                  React.createElement("div", { className: "canvas-container", style: {minHeight:200} },
                    currentFrame?.imgEl && React.createElement("canvas", { ref: origCanvasRef, className: "max-w-full max-h-64 object-contain" })
                  )
                ),
                React.createElement("div", { className: "card" },
                  React.createElement("p", { className: "text-xs font-bold mb-2", style: { color: 'var(--text-muted)' } }, "像素化预览"),
                  React.createElement("div", { className: "canvas-container", style: {minHeight:200} },
                    React.createElement("canvas", { ref: pixelCanvasRef, className: "max-w-full max-h-64", style: {imageRendering:"pixelated"} })
                  )
                )
              ),
              currentFrame && React.createElement("div", { className: "card" },
                React.createElement("div", { className: "grid grid-cols-1 sm:grid-cols-2 gap-6" },
                  React.createElement("div", null,
                    React.createElement("label", { className: "text-sm mb-2 block", style: { color: 'var(--text-secondary)' } }, 
                      "分辨率 ", React.createElement("span", { className: "badge" }, res+"×"+res)
                    ),
                    React.createElement("input", { type: "range", min: 8, max: 256, step: 8, value: res, onChange: e=>setRes(Number(e.target.value)), className: "w-full" }),
                    React.createElement("div", { className: "flex justify-between text-xs mt-1", style: { color: 'var(--text-muted)' } }, React.createElement("span", null, "8px"), React.createElement("span", null, "256px"))
                  ),
                  React.createElement("div", null,
                    React.createElement("label", { className: "text-sm mb-2 block", style: { color: 'var(--text-secondary)' } }, 
                      "颜色数量 ", React.createElement("span", { className: "badge" }, colors)
                    ),
                    React.createElement("input", { type: "range", min: 2, max: paletteMode==="GameBoy"?4:paletteMode==="灰度"?16:256, value: colors, onChange: e=>setColors(Number(e.target.value)), className: "w-full" }),
                    React.createElement("div", { className: "flex justify-between text-xs mt-1", style: { color: 'var(--text-muted)' } }, React.createElement("span", null, "2"), React.createElement("span", null, "256"))
                  )
                )
              ),
              React.createElement("div", { className: "text-xs text-center py-2", style: { color: 'var(--text-muted)' } },
                "帧数: ", frames.length, " | 当前: 第", currentFrameIndex + 1, "帧", 
                isPlaying && React.createElement("span", { className: "ml-2", style: { color: 'var(--accent)' } }, "● 播放中")
              )
            ),

            // Right Column - Export Options
            React.createElement("div", { className: "space-y-4" },
              React.createElement("div", { className: "card" },
                React.createElement("p", { className: "section-title" }, "导出选项"),
                React.createElement("div", { className: "space-y-3" },
                  React.createElement("div", { className: "flex items-center justify-between" },
                    React.createElement("span", { className: "text-sm", style: { color: 'var(--text-secondary)' } }, "雪碧图列数"),
                    React.createElement("input", {
                      type: "number",
                      min: 1,
                      max: frames.length || 10,
                      value: spriteCols,
                      onChange: e => setSpriteCols(Number(e.target.value)),
                      className: "w-20 text-center"
                    })
                  ),
                  React.createElement("div", { className: "flex items-center justify-between" },
                    React.createElement("span", { className: "text-sm", style: { color: 'var(--text-secondary)' } }, "帧命名规则"),
                    React.createElement("input", {
                      type: "text",
                      value: frameNaming,
                      onChange: e => setFrameNaming(e.target.value),
                      className: "w-32 text-sm text-right"
                    })
                  )
                )
              ),
              React.createElement("div", { className: "card" },
                React.createElement("p", { className: "section-title" }, "快捷导出"),
                React.createElement("div", { className: "space-y-2" },
                  React.createElement("button", {
                    onClick: exportGif,
                    disabled: frames.length < 2 || isExporting,
                    className: "btn btn-secondary w-full justify-center"
                  }, "🎬 导出 GIF 动画"),
                  React.createElement("button", {
                    onClick: exportPngSequence,
                    disabled: frames.length < 1 || isExporting,
                    className: "btn btn-secondary w-full justify-center"
                  }, "📦 导出 PNG 序列"),
                  React.createElement("button", {
                    onClick: exportSpriteSheet,
                    disabled: frames.length < 1 || isExporting,
                    className: "btn btn-primary w-full justify-center"
                  }, "🖼 导出雪碧图"),
                  React.createElement("button", {
                    onClick: exportJson,
                    disabled: frames.length < 1 || isExporting,
                    className: "btn btn-secondary w-full justify-center"
                  }, "📋 导出 JSON 图谱"),
                  React.createElement("button", {
                    onClick: exportSpriteSheetWithJson,
                    disabled: frames.length < 1 || isExporting,
                    className: "btn btn-secondary w-full justify-center"
                  }, "📦 雪碧图 + JSON")
                )
              ),
              React.createElement("div", { className: "card", style: { background: 'var(--bg-dark)', border: '1px solid var(--border)' } },
                React.createElement("p", { className: "text-xs", style: { color: 'var(--text-muted)' } },
                  "💡 提示: 雪碧图导出支持配置行列数，JSON图谱兼容主流游戏引擎格式"
                )
              )
            )
          )
        )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
