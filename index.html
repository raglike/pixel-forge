<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ========== VERSION CONFIG ==========
    const VERSION_CONFIG = {
      free: {
        maxResolution: 64,
        maxFrames: 8,
        customPalette: false,
        onionSkin: false,
        animationPresets: false,
        asepriteExport: false,
        gifImport: false,
        threePreview: false,
        aiFeatures: false,
      },
      pro: {
        maxResolution: 256,
        maxFrames: 32,
        customPalette: true,
        onionSkin: true,
        animationPresets: true,
        asepriteExport: true,
        gifImport: true,
        threePreview: true,
        aiFeatures: true,
      },
      enterprise: {
        maxResolution: Infinity,
        maxFrames: Infinity,
        customPalette: true,
        onionSkin: true,
        animationPresets: true,
        asepriteExport: true,
        gifImport: true,
        threePreview: true,
        aiFeatures: true,
      }
    };

    const DEFAULT_VERSION = 'pro';

    function medianCut(imgData, maxColors) {
      if (!imgData || !imgData.data || imgData.data.length === 0) return [];
      const pixels = [];
      for (let i = 0; i < imgData.data.length; i += 4) {
        pixels.push([imgData.data[i], imgData.data[i+1], imgData.data[i+2]]);
      }
      function getColorRange(pixels) {
        let minR=255,maxR=0,minG=255,maxG=0,minB=255,maxB=0;
        for (const p of pixels) {
          minR=Math.min(minR,p[0]); maxR=Math.max(maxR,p[0]);
          minG=Math.min(minG,p[1]); maxG=Math.max(maxG,p[1]);
          minB=Math.min(minB,p[2]); maxB=Math.max(maxB,p[2]);
        }
        const r=maxR-minR, g=maxG-minG, b=maxB-minB;
        if (r>=g && r>=b) return 0;
        if (g>=r && g>=b) return 1;
        return 2;
      }
      function split(pixels) {
        const channel = getColorRange(pixels);
        pixels.sort((a,b) => a[channel]-b[channel]);
        const mid = Math.floor(pixels.length/2);
        return [pixels.slice(0,mid), pixels.slice(mid)];
      }
      function avgColor(pixels) {
        if (pixels.length===0) return [0,0,0];
        const s=pixels.reduce((a,p)=>[a[0]+p[0],a[1]+p[1],a[2]+p[2]],[0,0,0]);
        return [Math.round(s[0]/pixels.length),Math.round(s[1]/pixels.length),Math.round(s[2]/pixels.length)];
      }
      let buckets = [pixels];
      while (buckets.length < maxColors) {
        buckets.sort((a,b)=>b.length-a.length);
        const b = buckets.shift();
        if (b.length < 2) { buckets.push(b); break; }
        const [a1,a2] = split(b);
        buckets.push(a1,a2);
      }
      return buckets.map(avgColor);
    }

    // ========== F40: BATCH PROCESSING HELPERS ==========
    /**
     * Convert hex palette string array to RGB array
     */
    function hexPaletteToRgb(hexColors) {
      return hexColors.map(c => {
        const r = parseInt(c.slice(1,3), 16);
        const g = parseInt(c.slice(3,5), 16);
        const b = parseInt(c.slice(5,7), 16);
        return [r, g, b];
      });
    }

    /**
     * Process an image element to a pixelated canvas
     * @param {HTMLImageElement} imgEl - Source image
     * @param {HTMLCanvasElement} targetCanvas - Target canvas (will be resized)
     * @param {number} targetRes - Target resolution (e.g., 64)
     * @param {string} paletteName - Palette name ('PICO-8', 'NES', 'GameBoy', '灰度', 'auto')
     * @param {number} numColors - Number of colors (2-256)
     */
    function processImageToCanvas(imgEl, targetCanvas, targetRes, paletteName, numColors) {
      if (!imgEl || !imgEl.complete || imgEl.naturalWidth === 0) return;

      const maxW = 512, maxH = 512;
      let w = imgEl.naturalWidth, h = imgEl.naturalHeight;
      const scale = Math.min(maxW / w, maxH / h, 1);
      w = Math.round(w * scale);
      h = Math.round(h * scale);

      // Create temp canvas for sampling
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w;
      tempCanvas.height = h;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(imgEl, 0, 0, w, h);

      // Sample and generate palette
      const sampleData = tempCtx.getImageData(0, 0, w, h);
      if (!sampleData || !sampleData.data || sampleData.data.length === 0) return;

      let currentPalette;
      if (paletteName === 'auto') {
        currentPalette = medianCut(sampleData.data, numColors);
      } else {
        const hexPalette = PALETTES[paletteName] || PALETTES['PICO-8'];
        currentPalette = hexPaletteToRgb(hexPalette);
        // Limit to numColors
        if (currentPalette.length > numColors) {
          currentPalette = currentPalette.slice(0, numColors);
        }
      }

      // Resize to target resolution
      targetCanvas.width = targetRes;
      targetCanvas.height = targetRes;
      const targetCtx = targetCanvas.getContext('2d');
      targetCtx.imageSmoothingEnabled = false;
      targetCtx.drawImage(tempCanvas, 0, 0, targetRes, targetRes);

      // Quantize colors
      const pixelData = targetCtx.getImageData(0, 0, targetRes, targetRes);
      const data = pixelData.data;
      for (let i = 0; i < data.length; i += 4) {
        const [r, g, b] = [data[i], data[i + 1], data[i + 2]];
        let best = currentPalette[0] || [0, 0, 0], bestDist = Infinity;
        for (const c of currentPalette) {
          const d = (r - c[0]) ** 2 + (g - c[1]) ** 2 + (b - c[2]) ** 2;
          if (d < bestDist) { bestDist = d; best = c; }
        }
        data[i] = best[0];
        data[i + 1] = best[1];
        data[i + 2] = best[2];
      }
      targetCtx.putImageData(pixelData, 0, 0);
    }

    const PALETTES = {
      "PICO-8": ["#000000","#1D2B53","#7E2553","#008751","#AB5236","#5F574F","#C2C3C7","#FFF1E8","#FF004D","#FFA300","#FFEC27","#00E436","#29ADFF","#83769C","#FF77A8","#FFCCAA"],
      "NES": ["#000000","#fcfcfc","#f8f8f8","#bcbcbc","#7c7c7c","#a4e4fc","#3cbcfc","#0078f8","#0000fc","#b8b8f8","#6888fc","#0058f8","#0000bc","#d8b8f8","#9878f8","#6844fc","#4428bc","#f8b8f8","#f878f8","#d800cc","#940084","#f8a4c0","#f85898","#e40058","#a80020","#f0d0b0","#f87858","#f83800","#a81000","#fce0a8","#fca044","#e45c10","#881400","#f8d878","#f8b800","#ac7c00","#503000","#d8f878","#b8f818","#00b800","#007800","#b8f8b8","#58d854","#00a800","#006800","#b8f8d8","#58f898","#00a844","#005800","#00fcfc","#00e8d8","#008888","#004058","#f8d8f8","#787878"],
      "GameBoy": ["#0f380f","#306230","#8bac0f","#9bbc0f"],
      "灰度": Array.from({length:16},(_,i)=>{const v=Math.round(i*17);return"#"+v.toString(16).padStart(2,"0").repeat(3);})
    };

    // ========== ANIMATION PRESETS ==========
    const BUILTIN_PRESETS = {
      walk4: { name: '走路循环(4帧)', frames: 4, loop: true, description: '经典4帧走路循环' },
      walk6: { name: '走路循环(6帧)', frames: 6, loop: true, description: '流畅6帧走路' },
      walk8: { name: '走路循环(8帧)', frames: 8, loop: true, description: '精细8帧走路' },
      idle2: { name: '待机(2帧)', frames: 2, loop: true, description: '简单待机动画' },
      idle4: { name: '待机(4帧)', frames: 4, loop: true, description: '细腻待机' },
      attack3: { name: '攻击(3帧)', frames: 3, loop: false, description: '快速三连击' },
      attack5: { name: '攻击(5帧)', frames: 5, loop: false, description: '完整攻击动作' },
      attack6: { name: '攻击(6帧)', frames: 6, loop: false, description: '精细攻击' },
      jump4: { name: '跳跃(4帧)', frames: 4, loop: false, description: '标准跳跃' },
      death4: { name: '死亡(4帧)', frames: 4, loop: false, description: '经典死亡' },
      death6: { name: '死亡(6帧)', frames: 6, loop: false, description: '完整死亡动画' },
    };

    function App() {
      // Version
      const [version, setVersion] = useState(() => localStorage.getItem('pixelforge_version') || DEFAULT_VERSION);
      const versionConf = VERSION_CONFIG[version] || VERSION_CONFIG.pro;

      // 3D Preview state
      const [threeInitialized, setThreeInitialized] = useState(false);
      const threeRefs = useRef({ scene: null, camera: null, renderer: null, sprite: null, controls: null, animationId: null });
      const threeCanvasRef = useRef(null);
      const [threeView, setThreeView] = useState('front');
      const [threeBgColor, setThreeBgColor] = useState('#1a1a2e');
      const [threeAmbient, setThreeAmbient] = useState(0.5);
      const [threeDirectional, setThreeDirectional] = useState(1.0);
      const [threeLightDir, setThreeLightDir] = useState({x: 1, y: 1, z: 1});
      const [threeScale, setThreeScale] = useState(1.0);

      // Core state
      const [frames, setFrames] = useState([]);
      const [currentFrameIndex, setCurrentFrameIndex] = useState(0);
      const [res, setRes] = useState(64);
      const [colors, setColors] = useState(16);
      const [paletteMode, setPaletteMode] = useState("auto");
      const [palette, setPalette] = useState([]);
      const [paletteColors, setPaletteColors] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [fps, setFps] = useState(12);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isExporting, setIsExporting] = useState(false);
      const [exportProgress, setExportProgress] = useState(0);
      const [frameNaming, setFrameNaming] = useState("frame_{n}");
      const [draggedIndex, setDraggedIndex] = useState(null);
      const [spriteCols, setSpriteCols] = useState(4);

      // F10: Onion Skin
      const [onionSkin, setOnionSkin] = useState(false);
      const [onionOpacity, setOnionOpacity] = useState(30);
      const [onionPrev, setOnionPrev] = useState(true);
      const [onionNext, setOnionNext] = useState(true);
      const [onionPrevFrames, setOnionPrevFrames] = useState(1);
      const [onionNextFrames, setOnionNextFrames] = useState(1);

      // F13: Custom Palette Editor
      const [customPalettes, setCustomPalettes] = useState(() => {
        const saved = localStorage.getItem('pixelforge_custom_palettes');
        return saved ? JSON.parse(saved) : {};
      });
      const [activePalette, setActivePalette] = useState(null);
      const [paletteTab, setPaletteTab] = useState('builtin');
      const [editingPaletteName, setEditingPaletteName] = useState('');
      const [showPaletteEditor, setShowPaletteEditor] = useState(false);
      const [eyedropperActive, setEyedropperActive] = useState(false);

      // F12: Animation Presets
      const [customPresets, setCustomPresets] = useState(() => {
        const saved = localStorage.getItem('pixelforge_custom_presets');
        return saved ? JSON.parse(saved) : [];
      });
      const [selectedPreset, setSelectedPreset] = useState(null);
      const [showPresetPanel, setShowPresetPanel] = useState(false);
      const [showSavePresetModal, setShowSavePresetModal] = useState(false);
      const [newPresetName, setNewPresetName] = useState('');
      const [presetPreviewPlaying, setPresetPreviewPlaying] = useState(false);

      // F11: GIF Smart Decomposition
      const [gifDropZone, setGifDropZone] = useState(false);
      const [gifFrames, setGifFrames] = useState([]);
      const [gifDuplicateDetect, setGifDuplicateDetect] = useState(true);
      const [showGifPanel, setShowGifPanel] = useState(false);
      const [gifProcessing, setGifProcessing] = useState(false);
      const [gifOriginalCount, setGifOriginalCount] = useState(0);
      const [gifProcessedCount, setGifProcessedCount] = useState(0);

      // F14: Aseprite Export

        newItems.forEach((item, idx) => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
              item.width = img.naturalWidth;
              item.height = img.naturalHeight;
              // Create thumbnail preview
              const thumb = document.createElement('canvas');
              const thumbSize = 64;
              thumb.width = thumbSize;
              thumb.height = thumbSize;
              const ctx = thumb.getContext('2d');
              ctx.imageSmoothingEnabled = false;
              const scale = Math.min(thumbSize / img.naturalWidth, thumbSize / img.naturalHeight);
              const w = img.naturalWidth * scale;
              const h = img.naturalHeight * scale;
              ctx.drawImage(img, (thumbSize - w) / 2, (thumbSize - h) / 2, w, h);
              item.preview = thumb.toDataURL();
              setBatchQueue(prev => {
                const exists = prev.find(q => q.id === item.id);
                if (exists) {
                  return prev.map(q => q.id === item.id ? item : q);
                }
                return [...prev, item];
              });
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });

        // Clear input
        if (e.target) e.target.value = '';
      }, []);

            processImageToCanvas(img, canvas, batchRes, batchPalette, batchColors);
            const resultUrl = canvas.toDataURL('image/png');
            resolve({ ...item, status: 'done', resultUrl });
          };
          img.onerror = () => {
            resolve({ ...item, status: 'done', resultUrl: item.preview });
          };
          img.src = item.preview || URL.createObjectURL(item.file);
        });
      }, [batchRes, batchPalette, batchColors]);

        xml += `    <Image filename="spritesheet.png" width="${data.width}" height="${data.height}" />\n`;

        for (const frame of data.frames) {
          xml += `      <Sprite name="${escapeXml(frame.name)}" x="${frame.x}" y="${frame.y}" width="${frame.width}" height="${frame.height}" />\n`;

        xml += `    </Sprites>\n`;
        xml += `  </Content>\n`;
        xml += `</TexturePacker>\n`;
        return xml;

        return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');

        // Simple GIF parser
        const frames_data = [];
        let pos = 0;
        let width = 0, height = 0;
        let globalColorTable = [];
        let delay = 100;

        pos = 13 + (flags & 0x80 ? gctSize * 3 : 0);
        
        // Find frames

          const blockType = gifData[pos];
          
          if (blockType === 0x21) { // Extension
            const extType = gifData[pos + 1];
            if (extType === 0xF9) { // Graphics Control Extension
              const blockSize = gifData[pos + 2];
              const delayData = gifData[pos + 4] + (gifData[pos + 5] << 8);
              delay = delayData * 10 || 100;
              pos += 2 + blockSize + 1;
            } else {
              pos += 2;
              while (gifData[pos] !== 0) pos += gifData[pos] + 1;
              pos++;
            }
          } else if (blockType === 0x2C) { // Image Descriptor
            const imgLeft = gifData[pos + 1] + (gifData[pos + 2] << 8);
            const imgTop = gifData[pos + 3] + (gifData[pos + 4] << 8);
            const imgWidth = gifData[pos + 5] + (gifData[pos + 6] << 8);
            const imgHeight = gifData[pos + 7] + (gifData[pos + 8] << 8);
            const imgFlags = gifData[pos + 9];
            const localCT = imgFlags & 0x80;
            const lctSize = localCT ? (2 << (imgFlags & 0x07)) : 0;
            
            pos += 10;
            if (localCT) {
              const localColors = [];
              for (let i = 0; i < lctSize * 3; i += 3) {
                localColors.push([gifData[pos + i], gifData[pos + i + 1], gifData[pos + i + 2]]);
              }
              pos += lctSize * 3;
            }
            
            // Skip LZW min code size
            pos++;
            
            // Read image data sub-blocks
            const imageData = [];
            let subBlockSize = gifData[pos];
            while (subBlockSize !== 0) {
              for (let i = 1; i <= subBlockSize; i++) {
                imageData.push(gifData[pos + i]);
              }
              pos += subBlockSize + 1;
              subBlockSize = gifData[pos];
            }
            pos++;
            
            // Create canvas for this frame
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            // Fill with transparency
            ctx.clearRect(0, 0, width, height);
            
            // Use color table
            const colorTable = localCT ? localColors.map(c => `rgb(${c[0]},${c[1]},${c[2]})`) : globalColorTable.map(c => `rgb(${c[0]},${c[1]},${c[2]})`);
            
            // Simple rendering (just draw rectangles per pixel - simplified)
            // For proper GIF decoding we'd need LZW decompression

            ctx.fillRect(0, 0, width, height);
            
            // Create img element

            frames_data.push({

              imgEl: img,
              name: `frame_${frames_data.length}`,
              duration: delay,
              canvas: canvas
            });
            
          } else if (blockType === 0x3B) { // Trailer
            break;
          } else {
            pos++;
          }

      const exportAsepriteAse = async () => {

        // Aseprite .ase file format
        // Simplified binary format
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = res;
        tempCanvas.height = res;
        const ctx = tempCanvas.getContext('2d');

        // Calculate total file size (rough estimate)
        // For each frame: header + chunk header + image data
        const frames_data = [];

        for (let i = 0; i < frames.length; i++) {
          processFrameToCanvas(frames[i], tempCanvas);
          const imageData = ctx.getImageData(0, 0, res, res);
          
          // Convert to RGBA bytes
          const rgba = new Uint8Array(res * res * 4);
          for (let j = 0; j < imageData.data.length; j++) {
            rgba[j] = imageData.data[j];
          }
          
          frames_data.push({
            duration: frames[i].duration,
            rgba
          });
          
          setExportProgress(Math.round((i + 1) / frames.length * 80));
        }

        // Build ASE file
        const headerSize = 4 + 2 + 2 + 4 + 4 + 2 + 2; // signature + version + frames + width + height + depth + flags
        let fileSize = headerSize;
        
        for (const frame of frames_data) {
          // Frame header: word(chunks) + dword(duration)
          // Each frame has 2 chunks: CEL + PALETTE
          fileSize += 6 + 4 + (res * res * 4) + 6 + 4; // rough estimate
        }

        const buffer = new ArrayBuffer(fileSize);
        const view = new DataView(buffer);
        let offset = 0;

        // Signature: "ASES"
        view.setUint8(offset++, 0x41);
        view.setUint8(offset++, 0x53);
        view.setUint8(offset++, 0x45);
        view.setUint8(offset++, 0x53);

        // Version: 1
        view.setUint16(offset, 1); offset += 2;

        // Number of frames
        view.setUint32(offset, frames.length); offset += 4;

        // Width
        view.setUint32(offset, res); offset += 4;

        // Height
        view.setUint32(offset, res); offset += 4;

        // Color depth (32-bit RGBA)
        view.setUint16(offset, 32); offset += 2;

        // Flags
        view.setUint16(offset, 0); offset += 2;

        // Write each frame
        for (let i = 0; i < frames_data.length; i++) {

          // Frame header
          view.setUint16(offset, 1); offset += 2; // 1 chunk for now

                      className: "badge text-xs",
                      style: { background: pluginEnabled[plugin.id] === false ? 'var(--border)' : 'var(--accent)', color: pluginEnabled[plugin.id] === false ? 'var(--text-muted)' : '#000' }
                    }, pluginEnabled[plugin.id] === false ? '已禁用' : '已启用')
                  )
                )
              ),

              // Plugin API info
              React.createElement("div", { className: "card mb-4", style: { background: 'var(--bg-dark)' } },
                React.createElement("p", { className: "text-sm font-bold mb-2", style: { color: 'var(--accent)' } }, "📖 插件开发指南"),
                React.createElement("pre", {
                  className: "text-xs p-3 rounded overflow-x-auto",
                  style: { color: 'var(--text-secondary)', maxHeight: '200px', overflowY: 'auto' }
                }, `// 注册插件
window.pixelForgePlugins.push({
  id: 'my-plugin',
  name: '我的插件',
  version: '1.0.0',
  author: '作者名',
  description: '插件描述',
  hooks: {
    onInit: () => { /* 初始化 */ },
    onMenu: () => [{ label: '菜单项', action: () => {} }],
    onExport: (frames, format) => { /* 导出扩展 */ }
  }
});`)
              ),

              React.createElement("button", {
                onClick: () => setShowPluginPanel(false),
                className: "btn btn-primary w-full justify-center"
              }, "关闭")
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

    // F35: Image Split / Grid Cut helper functions
    window.splitImageGrid = function(imgEl, splitCols, splitRows) {
      if (!imgEl || !imgEl.complete || imgEl.naturalWidth === 0) {
        return [];
      }

      const results = [];
      const cellW = Math.floor(imgEl.naturalWidth / splitCols);
      const cellH = Math.floor(imgEl.naturalHeight / splitRows);

      for (let row = 0; row < splitRows; row++) {
        for (let col = 0; col < splitCols; col++) {
          const canvas = document.createElement('canvas');
          canvas.width = cellW;
          canvas.height = cellH;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(
            imgEl,
            col * cellW, row * cellH, cellW, cellH,
            0, 0, cellW, cellH
          );
          results.push(canvas);
        }
      }

      return results;
    };

    window.splitResultsToFrames = async function(splitResults, frameName, frameDuration) {
      const newFrames = [];

      for (let i = 0; i < splitResults.length; i++) {
        const canvas = splitResults[i];
        const imgEl = new Image();
        imgEl.src = canvas.toDataURL();

        await new Promise(resolve => {
          imgEl.onload = resolve;
          // Fallback in case onload already fired
          if (imgEl.complete && imgEl.naturalWidth > 0) resolve();
        });

        newFrames.push({
          id: Date.now() + Math.random() + i,
          imgEl: imgEl,
          name: (frameName || 'frame') + ' ' + (i + 1),
          duration: frameDuration || 100
        });
      }

      return newFrames;
    };
  </script>

          console.log('SW registered:', registration.scope);
        }).catch(function(error) {
          console.log('SW registration failed:', error);
        });
      });
    }
  </script>
